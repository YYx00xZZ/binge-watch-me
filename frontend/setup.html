<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>binge-watch-me — setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 320px;
      width: 100%;
    }
    h1 { font-size: 20px; font-weight: 600; }
    p  { font-size: 14px; color: #888; line-height: 1.5; }
    img {
      width: 200px;
      height: 200px;
      background: #fff;
      padding: 8px;
      border-radius: 8px;
    }
    .hint { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>binge-watch-me</h1>
    <p>Scan this QR code with your phone to open the remote</p>
    <img src="/qr" alt="QR Code" />
    <span class="hint">Keep this window open while scanning</span>
  </div>
</body>
</html>
